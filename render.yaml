services:
  - type: web
    name: bbms-backend
    env: docker
    plan: starter
    dockerContext: ./apps/backend
    dockerfilePath: ./apps/backend/Dockerfile
    autoDeploy: false
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Blood Bank Management API
      - key: APP_VERSION
        value: 1.0.0
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
