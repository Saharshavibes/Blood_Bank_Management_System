name: Release Gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Release target
        required: true
        type: choice
        options:
          - staging
          - production
        default: production

jobs:
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate backend code
        run: python -m compileall app

      - name: Run backend tests
        run: pytest -q

      - name: Validate migrations
        run: |
          alembic -c alembic.ini history
          alembic -c alembic.ini upgrade head --sql > migration_preview.sql

  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  deployment-smoke:
    name: Deployment Smoke Gate
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    env:
      TARGET_ENV: ${{ github.event.inputs.environment }}
      BACKEND_HEALTH_URL_STAGING: ${{ secrets.BACKEND_HEALTH_URL_STAGING }}
      BACKEND_AUTH_LOGIN_URL_STAGING: ${{ secrets.BACKEND_AUTH_LOGIN_URL_STAGING }}
      FRONTEND_URL_STAGING: ${{ secrets.FRONTEND_URL_STAGING }}
      BACKEND_HEALTH_URL_PRODUCTION: ${{ secrets.BACKEND_HEALTH_URL_PRODUCTION }}
      BACKEND_AUTH_LOGIN_URL_PRODUCTION: ${{ secrets.BACKEND_AUTH_LOGIN_URL_PRODUCTION }}
      FRONTEND_URL_PRODUCTION: ${{ secrets.FRONTEND_URL_PRODUCTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve smoke target URLs
        shell: bash
        run: |
          sanitize_url() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          if [ "$TARGET_ENV" = "staging" ]; then
            HEALTH_URL="$BACKEND_HEALTH_URL_STAGING"
            AUTH_URL="$BACKEND_AUTH_LOGIN_URL_STAGING"
            APP_URL="$FRONTEND_URL_STAGING"
          else
            HEALTH_URL="$BACKEND_HEALTH_URL_PRODUCTION"
            AUTH_URL="$BACKEND_AUTH_LOGIN_URL_PRODUCTION"
            APP_URL="$FRONTEND_URL_PRODUCTION"
          fi

          HEALTH_URL="$(sanitize_url "$HEALTH_URL")"
          AUTH_URL="$(sanitize_url "$AUTH_URL")"
          APP_URL="$(sanitize_url "$APP_URL")"

          if [ -z "$HEALTH_URL" ] || [ -z "$AUTH_URL" ] || [ -z "$APP_URL" ]; then
            echo "::error::BACKEND_HEALTH_URL, BACKEND_AUTH_LOGIN_URL, and FRONTEND_URL are required for release gating"
            exit 1
          fi

          echo "HEALTH_URL=$HEALTH_URL" >> "$GITHUB_ENV"
          echo "AUTH_URL=$AUTH_URL" >> "$GITHUB_ENV"
          echo "APP_URL=$APP_URL" >> "$GITHUB_ENV"

      - name: Verify backend migration state
        timeout-minutes: 6
        run: |
          python scripts/deploy/verify_migration_state.py \
            --backend-health-url "$HEALTH_URL" \
            --retries 12 \
            --delay-seconds 5 \
            --request-timeout 8

      - name: Run deployment smoke checks
        run: |
          python scripts/deploy/smoke_check.py \
            --backend-health-url "$HEALTH_URL" \
            --frontend-url "$APP_URL" \
            --auth-login-url "$AUTH_URL" \
            --retries 24 \
            --delay-seconds 10
