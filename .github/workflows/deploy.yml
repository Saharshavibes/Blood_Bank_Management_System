name: CD Deploy Hooks

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
        default: production

jobs:
  deploy:
    name: Trigger Render and Vercel Deploys
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV_INPUT: ${{ github.event.inputs.environment }}
      RENDER_DEPLOY_HOOK_URL_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}
      VERCEL_DEPLOY_HOOK_URL_STAGING: ${{ secrets.VERCEL_DEPLOY_HOOK_URL_STAGING }}
      BACKEND_HEALTH_URL_STAGING: ${{ secrets.BACKEND_HEALTH_URL_STAGING }}
      BACKEND_AUTH_LOGIN_URL_STAGING: ${{ secrets.BACKEND_AUTH_LOGIN_URL_STAGING }}
      FRONTEND_URL_STAGING: ${{ secrets.FRONTEND_URL_STAGING }}
      RENDER_DEPLOY_HOOK_URL_PRODUCTION: ${{ secrets.RENDER_DEPLOY_HOOK_URL_PRODUCTION }}
      VERCEL_DEPLOY_HOOK_URL_PRODUCTION: ${{ secrets.VERCEL_DEPLOY_HOOK_URL_PRODUCTION }}
      BACKEND_HEALTH_URL_PRODUCTION: ${{ secrets.BACKEND_HEALTH_URL_PRODUCTION }}
      BACKEND_AUTH_LOGIN_URL_PRODUCTION: ${{ secrets.BACKEND_AUTH_LOGIN_URL_PRODUCTION }}
      FRONTEND_URL_PRODUCTION: ${{ secrets.FRONTEND_URL_PRODUCTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve target environment
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "$DEPLOY_ENV_INPUT" ]; then
            echo "DEPLOY_ENV=$DEPLOY_ENV_INPUT" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENV=production" >> "$GITHUB_ENV"
          fi

      - name: Resolve environment secrets
        shell: bash
        run: |
          sanitize_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          require_secret() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::$key is required for $DEPLOY_ENV deployments"
              return 1
            fi
            return 0
          }

          MISSING=0

          if [ "$DEPLOY_ENV" = "staging" ]; then
            require_secret "RENDER_DEPLOY_HOOK_URL_STAGING" "$RENDER_DEPLOY_HOOK_URL_STAGING" || MISSING=1
            require_secret "VERCEL_DEPLOY_HOOK_URL_STAGING" "$VERCEL_DEPLOY_HOOK_URL_STAGING" || MISSING=1
            require_secret "BACKEND_HEALTH_URL_STAGING" "$BACKEND_HEALTH_URL_STAGING" || MISSING=1
            require_secret "BACKEND_AUTH_LOGIN_URL_STAGING" "$BACKEND_AUTH_LOGIN_URL_STAGING" || MISSING=1
            require_secret "FRONTEND_URL_STAGING" "$FRONTEND_URL_STAGING" || MISSING=1

            if [ "$MISSING" -ne 0 ]; then
              exit 1
            fi

            echo "RENDER_DEPLOY_HOOK_URL=$(sanitize_value "$RENDER_DEPLOY_HOOK_URL_STAGING")" >> "$GITHUB_ENV"
            echo "VERCEL_DEPLOY_HOOK_URL=$(sanitize_value "$VERCEL_DEPLOY_HOOK_URL_STAGING")" >> "$GITHUB_ENV"
            echo "BACKEND_HEALTH_URL=$(sanitize_value "$BACKEND_HEALTH_URL_STAGING")" >> "$GITHUB_ENV"
            echo "BACKEND_AUTH_LOGIN_URL=$(sanitize_value "$BACKEND_AUTH_LOGIN_URL_STAGING")" >> "$GITHUB_ENV"
            echo "FRONTEND_URL=$(sanitize_value "$FRONTEND_URL_STAGING")" >> "$GITHUB_ENV"
            echo "HOOK_ENV_SOURCE=staging" >> "$GITHUB_ENV"
          else
            require_secret "RENDER_DEPLOY_HOOK_URL_PRODUCTION" "$RENDER_DEPLOY_HOOK_URL_PRODUCTION" || MISSING=1
            require_secret "VERCEL_DEPLOY_HOOK_URL_PRODUCTION" "$VERCEL_DEPLOY_HOOK_URL_PRODUCTION" || MISSING=1
            require_secret "BACKEND_HEALTH_URL_PRODUCTION" "$BACKEND_HEALTH_URL_PRODUCTION" || MISSING=1
            require_secret "BACKEND_AUTH_LOGIN_URL_PRODUCTION" "$BACKEND_AUTH_LOGIN_URL_PRODUCTION" || MISSING=1
            require_secret "FRONTEND_URL_PRODUCTION" "$FRONTEND_URL_PRODUCTION" || MISSING=1

            if [ "$MISSING" -ne 0 ]; then
              exit 1
            fi

            echo "RENDER_DEPLOY_HOOK_URL=$(sanitize_value "$RENDER_DEPLOY_HOOK_URL_PRODUCTION")" >> "$GITHUB_ENV"
            echo "VERCEL_DEPLOY_HOOK_URL=$(sanitize_value "$VERCEL_DEPLOY_HOOK_URL_PRODUCTION")" >> "$GITHUB_ENV"
            echo "BACKEND_HEALTH_URL=$(sanitize_value "$BACKEND_HEALTH_URL_PRODUCTION")" >> "$GITHUB_ENV"
            echo "BACKEND_AUTH_LOGIN_URL=$(sanitize_value "$BACKEND_AUTH_LOGIN_URL_PRODUCTION")" >> "$GITHUB_ENV"
            echo "FRONTEND_URL=$(sanitize_value "$FRONTEND_URL_PRODUCTION")" >> "$GITHUB_ENV"
            echo "HOOK_ENV_SOURCE=production" >> "$GITHUB_ENV"
          fi

      - name: Verify staging hook isolation
        shell: bash
        run: |
          if [ "$DEPLOY_ENV" != "staging" ]; then
            exit 0
          fi

          sanitize_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          RESOLVED_RENDER="$(sanitize_value "$RENDER_DEPLOY_HOOK_URL")"
          RESOLVED_VERCEL="$(sanitize_value "$VERCEL_DEPLOY_HOOK_URL")"
          STAGING_RENDER="$(sanitize_value "$RENDER_DEPLOY_HOOK_URL_STAGING")"
          STAGING_VERCEL="$(sanitize_value "$VERCEL_DEPLOY_HOOK_URL_STAGING")"
          PRODUCTION_RENDER="$(sanitize_value "$RENDER_DEPLOY_HOOK_URL_PRODUCTION")"
          PRODUCTION_VERCEL="$(sanitize_value "$VERCEL_DEPLOY_HOOK_URL_PRODUCTION")"

          if [ "$HOOK_ENV_SOURCE" != "staging" ]; then
            echo "::error::Staging deploy must resolve deployment hooks from staging secrets only"
            exit 1
          fi

          if [ "$RESOLVED_RENDER" != "$STAGING_RENDER" ] || [ "$RESOLVED_VERCEL" != "$STAGING_VERCEL" ]; then
            echo "::error::Staging deploy hooks were not resolved from staging secrets"
            exit 1
          fi

          if [ -n "$PRODUCTION_RENDER" ] && [ "$RESOLVED_RENDER" = "$PRODUCTION_RENDER" ]; then
            echo "::error::Staging Render deploy hook matches production hook; refusing deployment"
            exit 1
          fi

          if [ -n "$PRODUCTION_VERCEL" ] && [ "$RESOLVED_VERCEL" = "$PRODUCTION_VERCEL" ]; then
            echo "::error::Staging Vercel deploy hook matches production hook; refusing deployment"
            exit 1
          fi

      - name: Validate deployment configuration
        shell: bash
        run: |
          KEYS=(RENDER_DEPLOY_HOOK_URL VERCEL_DEPLOY_HOOK_URL BACKEND_HEALTH_URL BACKEND_AUTH_LOGIN_URL FRONTEND_URL HOOK_ENV_SOURCE)
          MISSING=0

          for KEY in "${KEYS[@]}"; do
            VALUE="${!KEY}"
            if [ -z "$VALUE" ]; then
              echo "::error::$KEY is required for $DEPLOY_ENV deployments"
              MISSING=1
            fi
          done

          if [ "$HOOK_ENV_SOURCE" != "$DEPLOY_ENV" ]; then
            echo "::error::Resolved secret source '$HOOK_ENV_SOURCE' does not match target environment '$DEPLOY_ENV'"
            MISSING=1
          fi

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Trigger Vercel deploy hook
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --show-error --silent -X POST "$VERCEL_DEPLOY_HOOK_URL"

      - name: Verify backend migration state
        if: ${{ env.BACKEND_HEALTH_URL != '' }}
        timeout-minutes: 6
        shell: bash
        run: |
          python scripts/deploy/verify_migration_state.py \
            --backend-health-url "$BACKEND_HEALTH_URL" \
            --retries 12 \
            --delay-seconds 5 \
            --request-timeout 8

      - name: Run deployment smoke check script
        if: ${{ env.BACKEND_HEALTH_URL != '' && env.FRONTEND_URL != '' && env.BACKEND_AUTH_LOGIN_URL != '' }}
        shell: bash
        run: |
          python scripts/deploy/smoke_check.py \
            --backend-health-url "$BACKEND_HEALTH_URL" \
            --frontend-url "$FRONTEND_URL" \
            --auth-login-url "$BACKEND_AUTH_LOGIN_URL" \
            --retries 24 \
            --delay-seconds 10
