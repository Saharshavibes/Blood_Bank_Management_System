name: CD Deploy Hooks

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
        default: production

jobs:
  deploy:
    name: Trigger Render and Vercel Deploys
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV_INPUT: ${{ github.event.inputs.environment }}
      RENDER_DEPLOY_HOOK_URL_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}
      VERCEL_DEPLOY_HOOK_URL_STAGING: ${{ secrets.VERCEL_DEPLOY_HOOK_URL_STAGING }}
      BACKEND_HEALTH_URL_STAGING: ${{ secrets.BACKEND_HEALTH_URL_STAGING }}
      BACKEND_AUTH_LOGIN_URL_STAGING: ${{ secrets.BACKEND_AUTH_LOGIN_URL_STAGING }}
      FRONTEND_URL_STAGING: ${{ secrets.FRONTEND_URL_STAGING }}
      RENDER_DEPLOY_HOOK_URL_PRODUCTION: ${{ secrets.RENDER_DEPLOY_HOOK_URL_PRODUCTION }}
      VERCEL_DEPLOY_HOOK_URL_PRODUCTION: ${{ secrets.VERCEL_DEPLOY_HOOK_URL_PRODUCTION }}
      BACKEND_HEALTH_URL_PRODUCTION: ${{ secrets.BACKEND_HEALTH_URL_PRODUCTION }}
      BACKEND_AUTH_LOGIN_URL_PRODUCTION: ${{ secrets.BACKEND_AUTH_LOGIN_URL_PRODUCTION }}
      FRONTEND_URL_PRODUCTION: ${{ secrets.FRONTEND_URL_PRODUCTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve target environment
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "$DEPLOY_ENV_INPUT" ]; then
            echo "DEPLOY_ENV=$DEPLOY_ENV_INPUT" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENV=production" >> "$GITHUB_ENV"
          fi

      - name: Resolve environment secrets
        shell: bash
        run: |
          if [ "$DEPLOY_ENV" = "staging" ]; then
            RESOLVED_STAGING_RENDER="$RENDER_DEPLOY_HOOK_URL_STAGING"
            RESOLVED_STAGING_VERCEL="$VERCEL_DEPLOY_HOOK_URL_STAGING"

            if [ -z "$RESOLVED_STAGING_RENDER" ]; then
              echo "::warning::RENDER_DEPLOY_HOOK_URL_STAGING is not set; falling back to production deploy hook"
              RESOLVED_STAGING_RENDER="$RENDER_DEPLOY_HOOK_URL_PRODUCTION"
            fi

            if [ -z "$RESOLVED_STAGING_VERCEL" ]; then
              echo "::warning::VERCEL_DEPLOY_HOOK_URL_STAGING is not set; falling back to production deploy hook"
              RESOLVED_STAGING_VERCEL="$VERCEL_DEPLOY_HOOK_URL_PRODUCTION"
            fi

            echo "RENDER_DEPLOY_HOOK_URL=$RESOLVED_STAGING_RENDER" >> "$GITHUB_ENV"
            echo "VERCEL_DEPLOY_HOOK_URL=$RESOLVED_STAGING_VERCEL" >> "$GITHUB_ENV"
            echo "BACKEND_HEALTH_URL=$BACKEND_HEALTH_URL_STAGING" >> "$GITHUB_ENV"
            echo "BACKEND_AUTH_LOGIN_URL=$BACKEND_AUTH_LOGIN_URL_STAGING" >> "$GITHUB_ENV"
            echo "FRONTEND_URL=$FRONTEND_URL_STAGING" >> "$GITHUB_ENV"
          else
            echo "RENDER_DEPLOY_HOOK_URL=$RENDER_DEPLOY_HOOK_URL_PRODUCTION" >> "$GITHUB_ENV"
            echo "VERCEL_DEPLOY_HOOK_URL=$VERCEL_DEPLOY_HOOK_URL_PRODUCTION" >> "$GITHUB_ENV"
            echo "BACKEND_HEALTH_URL=$BACKEND_HEALTH_URL_PRODUCTION" >> "$GITHUB_ENV"
            echo "BACKEND_AUTH_LOGIN_URL=$BACKEND_AUTH_LOGIN_URL_PRODUCTION" >> "$GITHUB_ENV"
            echo "FRONTEND_URL=$FRONTEND_URL_PRODUCTION" >> "$GITHUB_ENV"
          fi

      - name: Validate deployment configuration
        shell: bash
        run: |
          KEYS=(RENDER_DEPLOY_HOOK_URL VERCEL_DEPLOY_HOOK_URL BACKEND_HEALTH_URL BACKEND_AUTH_LOGIN_URL FRONTEND_URL)
          MISSING=0

          for KEY in "${KEYS[@]}"; do
            VALUE="${!KEY}"
            if [ -z "$VALUE" ]; then
              echo "::error::$KEY is required for $DEPLOY_ENV deployments"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Trigger Vercel deploy hook
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --show-error --silent -X POST "$VERCEL_DEPLOY_HOOK_URL"

      - name: Verify backend migration state
        if: ${{ env.BACKEND_HEALTH_URL != '' }}
        timeout-minutes: 6
        shell: bash
        run: |
          python scripts/deploy/verify_migration_state.py \
            --backend-health-url "$BACKEND_HEALTH_URL" \
            --retries 12 \
            --delay-seconds 5 \
            --request-timeout 8

      - name: Run deployment smoke check script
        if: ${{ env.BACKEND_HEALTH_URL != '' && env.FRONTEND_URL != '' && env.BACKEND_AUTH_LOGIN_URL != '' }}
        shell: bash
        run: |
          python scripts/deploy/smoke_check.py \
            --backend-health-url "$BACKEND_HEALTH_URL" \
            --frontend-url "$FRONTEND_URL" \
            --auth-login-url "$BACKEND_AUTH_LOGIN_URL" \
            --retries 24 \
            --delay-seconds 10
