services:
  postgres:
    image: postgres:16-alpine
    container_name: bbms_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blood_bank}
      POSTGRES_USER: ${POSTGRES_USER:-bbms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bbms_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bbms_user} -d ${POSTGRES_DB:-blood_bank}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bbms_prod_network

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: bbms_backend_prod
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Blood Bank Management API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bbms_user}:${POSTGRES_PASSWORD:-bbms_password}@postgres:5432/${POSTGRES_DB:-blood_bank}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - bbms_prod_network

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: bbms_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - bbms_prod_network

volumes:
  postgres_prod_data:

networks:
  bbms_prod_network:
    driver: bridge
