services:
  postgres:
    image: postgres:16-alpine
    container_name: bbms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blood_bank}
      POSTGRES_USER: ${POSTGRES_USER:-bbms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bbms_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bbms_user} -d ${POSTGRES_DB:-blood_bank}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bbms_network

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: bbms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@bloodbank.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bbms_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  bbms_network:
    driver: bridge
